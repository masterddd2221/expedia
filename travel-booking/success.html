<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Booking Confirmed • Expedia</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{

    font-family:Inter,sans-serif;

    background:#f7f8fa;

    display:flex;

    flex-direction:column;

    min-height:100vh;

}

header{

    height:72px;

    display:flex;

    align-items:center;

    padding:0 24px;

    background:#fff;

}

header img{

    height:34px;

}

main{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

}

.card{

    width:100%;

    max-width:480px;

    border:none;

    border-radius:22px;

    box-shadow:0 20px 45px rgba(0,0,0,.08);

    padding:42px;

}

.check{

    width:95px;

    height:95px;

    margin:auto;

    border-radius:50%;

    background:#22c55e;

    color:#fff;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:46px;

}

h2{

    margin-top:25px;

    text-align:center;

    font-weight:700;

}

p{

    text-align:center;

    color:#6b7280;

    line-height:1.7;

}

.reference{

    background:#f7f8fa;

    border-radius:14px;

    padding:18px;

    margin:30px 0;

    text-align:center;

}

.reference small{

    color:#6b7280;

}

.reference h4{

    margin-top:8px;

    letter-spacing:2px;

}

.btn-home{

    width:100%;

    height:55px;

    border:none;

    border-radius:14px;

    background:#1668E8;

    color:#fff;

    font-weight:600;

}

.btn-home:hover{

    background:#1158c8;

}

</style>

</head>

<body>

<header>

<!-- PUT YOUR LOGO HERE -->

<img src="images/logo.png" alt="Logo">

</header>

<main>

<div class="card">

<div class="check">

✓

</div>

<h2>

Booking Request Received

</h2>

<p>

Thank you for choosing Expedia.

Your booking request has been received successfully.

Our travel team is confirming your reservation with the airline.

You'll receive your confirmation and itinerary shortly.

</p>

<div class="reference">

<small>

Booking Reference

</small>

<h4 id="bookingRef">

TB-8F21A9D4

</h4>

</div>

<button

class="btn-home"

onclick="window.location='index.html'">

Back to Home

</button>

</div>

</main>

<script>

function randomRef(){

    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    let ref="TB-";

    for(let i=0;i<8;i++){

        ref+=chars[Math.floor(Math.random()*chars.length)];

    }

    return ref;

}

document.getElementById("bookingRef").textContent=randomRef();

</script>

</body>
</html>
