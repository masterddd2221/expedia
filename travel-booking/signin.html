<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in • Expedia</title>

  <!-- Favicon -->
<link rel="icon" type="image/png" href="images/favic.png">

  <!-- Bootstrap + fonts (reuse what you already have) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#fff;color:#111}
    .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
    .auth-card{width:100%;max-width:420px;border-radius:14px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,0.06);background:#fff}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .brand img{height:34px}
    .form-control:focus{box-shadow:none;border-color:#1668E8}
    .btn-primary{background:#1668E8;border-color:#1668E8}
    .muted{color:#6B7280;font-size:13px}
    .small-link{font-size:13px}
    .alert{font-size:14px}
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="brand">
        <img src="images/logo.png" alt="Logo">
        <div>
          
        </div>
      </div>
      <div class="muted">Sign in to continue</div>

      <div id="alertPlaceholder"></div>

      <form id="signinForm" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label small text-muted">Email</label>
          <input id="email" type="email" class="form-control" required placeholder="you@example.com" />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label small text-muted">Password</label>
          <input id="password" type="password" class="form-control" required placeholder="Enter password" />
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label small muted" for="remember">Remember me</label>
          </div>
          <a href="register.html" class="small-link">Create account</a>
        </div>

        <button class="btn btn-primary w-100 mb-2" type="submit">Sign in</button>

      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
