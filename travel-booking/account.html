<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Account • Expedia Booking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#fff;color:#111}
    header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(0,0,0,0.04)}
    .container{max-width:1100px;margin:28px auto;padding:0 18px}
    .card{border-radius:12px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,0.05)}
    .muted{color:#6B7280}
    .btn-logout{background:#fff;border:1px solid rgba(0,0,0,0.06)}
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <img src="images/logo-placeholder.png" alt="Logo" style="height:32px">
      <div style="font-weight:700">TravelBooking</div>
    </div>

    <div>
      <span id="accountEmail" class="muted"></span>
      <button id="signOutBtn" class="btn btn-sm btn-logout ms-3">Sign out</button>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h3 id="welcome">Welcome</h3>
      <p class="muted">You're signed in to the demo TravelBooking account. Below is a mock account area — you can use this to continue to /book or your checkout flow.</p>

      <div class="mt-3">
        <a href="index.html" class="btn btn-outline-primary">Back to home</a>
        <a href="book.html" class="btn btn-primary ms-2">Go to booking (mock)</a>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script>
    // Protect page and populate user info
    (function(){
      const user = auth.currentUser();
      if(!user){
        // not signed in — redirect to sign-in
        window.location.href = 'signin.html';
        return;
      }
      document.getElementById('accountEmail').textContent = user.email;
      document.getElementById('welcome').textContent = 'Hello, ' + (user.name || user.email.split('@')[0]);
      document.getElementById('signOutBtn').addEventListener('click', ()=>{
        auth.logout();
        window.location.href = 'signin.html';
      });
    })();
  </script>
</body>
</html>
