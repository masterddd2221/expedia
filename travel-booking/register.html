<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register • TravelBooking (Demo)</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#fff;color:#111}
    .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
    .auth-card{width:100%;max-width:480px;border-radius:14px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,0.06);background:#fff}
    .form-control:focus{box-shadow:none;border-color:#1668E8}
    .btn-primary{background:#1668E8;border-color:#1668E8}
    .muted{color:#6B7280;font-size:13px}
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-weight:700">Create account</div>
          <div class="muted">Register for the demo site</div>
        </div>
        <div><a href="signin.html" class="muted small-link">Sign in</a></div>
      </div>

      <div id="alertPlaceholder"></div>

      <form id="registerForm" class="mt-3" novalidate>
        <div class="mb-3">
          <label class="form-label small text-muted">Full name</label>
          <input id="name" class="form-control" required placeholder="Your name" />
        </div>

        <div class="mb-3">
          <label class="form-label small text-muted">Email</label>
          <input id="regEmail" type="email" class="form-control" required placeholder="you@example.com" />
        </div>

        <div class="mb-3">
          <label class="form-label small text-muted">Password</label>
          <input id="regPassword" type="password" class="form-control" required placeholder="Choose a password" />
        </div>

        <div class="mb-3">
          <label class="form-label small text-muted">Confirm password</label>
          <input id="regConfirm" type="password" class="form-control" required placeholder="Confirm password" />
        </div>

        <button class="btn btn-primary w-100" type="submit">Create account</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
