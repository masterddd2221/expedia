<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flights • TravelBooking (Demo)</title>

  <!-- Favicon -->
<link rel="icon" type="image/png" href="images/favic.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="container d-flex align-items-center gap-3 py-3">
      <a class="brand d-flex align-items-center gap-2" href="index.html">
        <img src="images/logo.png" alt="Logo" style="height:34px">
      </a>
      <div class="ms-auto">
        <a class="btn btn-outline-primary btn-sm" href="signin.html">Sign in</a>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <div class="card p-3 rounded-4 shadow-sm flight-search-card">
      <ul class="nav nav-tabs border-0 mb-3" role="tablist">
        <li class="nav-item"><a class="nav-link active" href="#">Roundtrip</a></li>
        <li class="nav-item"><a class="nav-link" href="#">One-way</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Multi-city</a></li>
      </ul>

      <form id="flightForm" class="gap-2">
        <div class="mb-2">
          <label class="form-label small text-muted">Leaving from</label>
          <div class="input-pill d-flex align-items-center">
            <i class="fa fa-map-marker-alt me-2 text-muted"></i>
            <input id="from" class="border-0 w-100" placeholder="HPN, FL (RSW - Southwest Florida Intl.)">
            <button type="button" id="swapBtn" class="btn btn-sm swap ms-2"><i class="fa fa-exchange-alt"></i></button>
          </div>
        </div>

        <div class="mb-2">
          <label class="form-label small text-muted">Going to</label>
          <div class="input-pill d-flex align-items-center">
            <i class="fa fa-map-marker-alt me-2 text-muted"></i>
            <input id="to" class="border-0 w-100" placeholder="Going to">
          </div>
        </div>

        <div class="mb-2">
          <label class="form-label small text-muted">Dates</label>
          <div class="input-pill d-flex align-items-center">
            <i class="fa fa-calendar me-2 text-muted"></i>
            <input id="dates" class="border-0 w-100 datepicker" placeholder="Wed, Jul 15 - Wed, Jul 22">
          </div>
        </div>

        <div class="mb-2">
          <label class="form-label small text-muted">Travelers, Cabin class</label>
          <div class="input-pill d-flex align-items-center" id="travelerBtn">
            <i class="fa fa-user me-2 text-muted"></i>
            <div class="flex-grow-1 text-start">1 traveler, Economy</div>
          </div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="addStay">
          <label class="form-check-label small text-muted" for="addStay">Add a place to stay</label>
        </div>

        <button class="btn btn-primary btn-lg w-100 rounded-pill">Search</button>
      </form>
    </div>

    <!-- Promotions -->
    <div class="mt-4">
      <div class="card p-3 rounded-4 promo-dark">
        <h4 class="text-white">Big Summer Sale: Save up to 40%</h4>
        <p class="text-white-50">Celebrate with up to 40% off select stays.</p>
      </div>
    </div>

    <div class="mt-4">
      <h5>Flight deals from Florida</h5>
      <div class="map-thumb rounded-3 overflow-hidden mt-2">
        <img src="images/map.png" alt="map" class="w-100">
      </div>
    </div>
  </main>

  <footer class="bg-light py-4">
    <div class="container text-center small">© Demo • TravelBooking</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
